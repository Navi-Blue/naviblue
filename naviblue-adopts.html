<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://ytmtgbjhgojtzqbposms.supabase.co; img-src 'self' data: blob: https:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navi.Blue — Adopts</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e14;--surface:#131a27;--surface2:#1a2335;
  --accent:#4a9eca;--accent2:#7ec8e3;--accent3:#2d6a8a;
  --text:#d8e8f0;--text-muted:#7a9db5;--text-dim:#3d5a70;
  --gold:#b8956a;--gold2:#d4b896;--gold3:#f0d5a8;
  --green:#6ecb8a;--red:#cb8888;--purple:#a47ec8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 8%,rgba(74,158,202,.07) 0%,transparent 55%),
             radial-gradient(ellipse 50% 60% at 85% 85%,rgba(45,106,138,.08) 0%,transparent 55%),
             radial-gradient(ellipse 30% 30% at 70% 20%,rgba(184,149,106,.04) 0%,transparent 50%);}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;border-radius:50%;opacity:0;animation:float-up linear infinite;}
@keyframes float-up{0%{opacity:0;transform:translateY(0) translateX(0)}10%{opacity:.5}90%{opacity:.2}100%{opacity:0;transform:translateY(-100vh) translateX(var(--drift))}}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.1rem 3rem;display:flex;align-items:center;justify-content:space-between;background:rgba(11,14,20,.88);backdrop-filter:blur(18px);border-bottom:1px solid rgba(74,158,202,.1);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:300;letter-spacing:.05em;color:var(--accent2);text-decoration:none;}
.nav-logo .dot{color:var(--gold);}
.nav-links{display:flex;gap:1.8rem;list-style:none;align-items:center;}
.nav-links a{color:var(--text-muted);text-decoration:none;font-size:.73rem;letter-spacing:.15em;text-transform:uppercase;transition:color .3s;}
.nav-links a:hover{color:var(--accent2);}
.lang-toggle{display:flex;border:1px solid var(--accent3);border-radius:20px;overflow:hidden;}
.lang-btn{background:none;border:none;cursor:pointer;padding:.3rem .85rem;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.12em;color:var(--text-muted);transition:all .3s;}
.lang-btn.active{background:var(--accent3);color:var(--accent2);}

/* ── SHARED ── */
section{position:relative;z-index:1;}
.section-header{text-align:center;margin-bottom:3.5rem;}
.section-header .eyebrow{font-size:.67rem;letter-spacing:.4em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:.9rem;}
.section-header h2{font-family:'Cormorant Garamond',serif;font-size:2.7rem;font-weight:300;color:var(--text);}
.section-header h2 em{font-style:italic;color:var(--accent2);}
.section-header p{margin-top:1rem;font-size:.86rem;color:var(--text-muted);max-width:560px;margin-left:auto;margin-right:auto;line-height:1.9;}
.section-divider{width:100%;max-width:160px;margin:0 auto;height:1px;background:linear-gradient(90deg,transparent,var(--accent3),transparent);opacity:.35;}

/* ── HERO ── */
#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem 4rem;}
.hero-eyebrow{font-size:.68rem;letter-spacing:.4em;text-transform:uppercase;color:var(--accent);margin-bottom:2rem;opacity:0;animation:fadein 1s .3s forwards;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,8vw,7rem);font-weight:300;line-height:1;opacity:0;animation:fadein 1s .6s forwards;}
.hero-title .dot{color:var(--accent);}
.hero-title em{font-style:italic;color:var(--accent2);}
.hero-sub{margin-top:1.5rem;font-size:.87rem;color:var(--text-muted);max-width:400px;line-height:2;opacity:0;animation:fadein 1s .9s forwards;}
.hero-line{width:1px;height:70px;background:linear-gradient(to bottom,var(--accent),transparent);margin:3rem auto 0;opacity:0;animation:fadein 1s 1.2s forwards;}
@keyframes fadein{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ── ABOUT ── */
#about{padding:7rem 2rem;max-width:920px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;}
.about-text h2{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;line-height:1.1;margin-bottom:1.5rem;}
.about-text h2 em{font-style:italic;color:var(--accent2);}
.about-text p{color:var(--text-muted);line-height:1.95;font-size:.86rem;margin-bottom:1rem;}
.about-deco{position:relative;height:280px;}
.deco-ring{position:absolute;border-radius:50%;border:1px solid;animation:spin linear infinite;}
.deco-ring:nth-child(1){width:190px;height:190px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(74,158,202,.2);animation-duration:22s;}
.deco-ring:nth-child(2){width:130px;height:130px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(126,200,227,.15);animation-duration:13s;animation-direction:reverse;}
.deco-ring:nth-child(3){width:260px;height:260px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(45,106,138,.1);animation-duration:35s;}
.deco-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;background:radial-gradient(circle,var(--accent3),var(--bg));border-radius:50%;box-shadow:0 0 28px rgba(74,158,202,.3),0 0 55px rgba(74,158,202,.1);}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* ── HORAIRES ── */
.schedule-box{max-width:800px;margin:0 auto 5rem;padding:0 2rem;}
.schedule-inner{background:var(--surface);border:1px solid rgba(74,158,202,.12);border-radius:14px;padding:2rem 2.5rem;position:relative;overflow:hidden;}
.schedule-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent3),transparent);}
.schedule-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--accent2);margin-bottom:1.4rem;display:flex;align-items:center;gap:.8rem;}
.schedule-title-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(74,158,202,.2),transparent);}
.schedule-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.schedule-slot{background:var(--surface2);border-radius:10px;padding:1rem 1.2rem;border:1px solid rgba(74,158,202,.07);position:relative;overflow:hidden;}
.schedule-slot::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:linear-gradient(to bottom,var(--accent3),transparent);}
.slot-icon{width:22px;height:22px;margin-bottom:.55rem;color:var(--accent3);opacity:.7;}
.slot-label{font-size:.63rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.35rem;}
.slot-time{font-size:.82rem;color:var(--text-muted);line-height:1.75;}
.slot-time strong{color:var(--accent2);font-weight:400;}
.schedule-note{margin-top:1rem;font-size:.77rem;color:var(--text-dim);font-style:italic;line-height:1.7;padding-left:.2rem;}

/* ── GALLERY PAGE ── */
#gallery-page{display:none;position:fixed;inset:0;z-index:90;background:var(--bg);overflow-y:auto;padding-top:80px;}
#gallery-page.open{display:block;}
.gallery-page-inner{max-width:1100px;margin:0 auto;padding:3rem 2rem 6rem;}
.gallery-page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2.5rem;}
.gallery-page-header h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;}
.gallery-page-header h2 em{font-style:italic;color:var(--accent2);}
.gallery-close-btn{background:none;border:1px solid var(--accent3);color:var(--accent2);cursor:pointer;padding:.4rem 1.2rem;border-radius:20px;font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.12em;transition:all .3s;}
.gallery-close-btn:hover{background:var(--accent3);}
.gallery-filters{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2rem;}
.filter-btn{background:none;border:1px solid var(--text-dim);color:var(--text-muted);cursor:pointer;padding:.3rem .9rem;border-radius:20px;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.1em;transition:all .3s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent2);}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1.2rem;}

/* ── ADOPT CARD (shared) ── */
.adopt-card{background:var(--surface);border:1px solid rgba(74,158,202,.08);border-radius:10px;overflow:hidden;transition:all .4s;cursor:pointer;position:relative;}
.adopt-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(74,158,202,.05),transparent);opacity:0;transition:opacity .4s;z-index:1;}
.adopt-card:not(.taken):not(.auction-card):hover{border-color:rgba(74,158,202,.3);transform:translateY(-4px);box-shadow:0 20px 55px rgba(0,0,0,.4),0 0 28px rgba(74,158,202,.08);}
.adopt-card:not(.taken):not(.auction-card):hover::before{opacity:1;}
.adopt-card.taken{opacity:.42;cursor:default;filter:grayscale(.55);}
.adopt-card.auction-card{border-color:rgba(184,149,106,.2);}
.adopt-card.auction-card:hover{border-color:rgba(184,149,106,.5);transform:translateY(-4px);box-shadow:0 20px 55px rgba(0,0,0,.4),0 0 28px rgba(184,149,106,.08);}
.card-img{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.adopt-card.taken .card-img::after{content:attr(data-label);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(11,14,20,.55);font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--text-muted);letter-spacing:.08em;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-img-placeholder{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-style:italic;color:var(--text-dim);user-select:none;}
.card-body{padding:1rem 1.2rem;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--text);}
.card-badges{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem;}
.badge{font-size:.57rem;letter-spacing:.1em;text-transform:uppercase;padding:.12rem .5rem;border-radius:20px;border:1px solid;}
.badge-fauna{border-color:rgba(74,158,202,.35);color:var(--accent2);background:rgba(74,158,202,.08);}
.badge-claim{border-color:rgba(164,126,200,.4);color:var(--purple);background:rgba(164,126,200,.08);}
.badge-auction{border-color:rgba(184,149,106,.4);color:var(--gold2);background:rgba(184,149,106,.08);}
.card-status{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;display:block;margin-top:.35rem;}
.s-available{color:var(--green);}
.s-sold{color:var(--text-dim);}
.s-claim{color:var(--purple);}
.s-auction{color:var(--gold2);}
.card-price{font-size:.83rem;color:var(--accent);margin-top:.3rem;}
.card-auction-price{font-size:.83rem;color:var(--gold2);margin-top:.3rem;}

/* ── CAROUSEL (mini, hero adopt) ── */
#gallery{padding:7rem 2rem 3rem;max-width:1100px;margin:0 auto;}
.carousel-wrap{position:relative;}
.carousel-track-outer{overflow:hidden;}
.carousel-track{display:flex;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.adopt-slide{flex-shrink:0;padding-right:1.4rem;}
.carousel-nav{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin-top:1.8rem;}
.carousel-btn{background:none;border:1px solid var(--accent3);color:var(--accent2);cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s;font-size:1rem;flex-shrink:0;}
.carousel-btn:hover:not(:disabled){background:var(--accent3);}
.carousel-btn:disabled{opacity:.25;cursor:default;}
.carousel-dots{display:flex;gap:.5rem;}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);border:none;cursor:pointer;padding:0;transition:all .3s;}
.carousel-dot.active{background:var(--accent2);width:18px;border-radius:3px;}
.view-all-btn{display:block;margin:2rem auto 0;background:none;border:1px solid var(--accent3);color:var(--accent2);cursor:pointer;padding:.6rem 2rem;border-radius:30px;font-family:'Jost',sans-serif;font-size:.76rem;letter-spacing:.15em;text-transform:uppercase;transition:all .3s;}
.view-all-btn:hover{background:var(--accent3);}

/* ── ADOPT POPUP ── */
.popup-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(7,10,17,.92);backdrop-filter:blur(14px);align-items:center;justify-content:center;padding:1.5rem;}
.popup-overlay.open{display:flex;}
.popup-box{background:var(--surface);border:1px solid rgba(74,158,202,.15);border-radius:16px;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;position:relative;display:grid;grid-template-columns:1fr 1fr;}
.popup-close{position:absolute;top:1rem;right:1.2rem;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem;z-index:10;}
.popup-close:hover{color:var(--text);}
.popup-gallery{border-right:1px solid rgba(74,158,202,.08);}
.popup-main-img{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:16px 0 0 0;}
.popup-main-img img{width:100%;height:100%;object-fit:cover;}
.popup-main-placeholder{font-family:'Cormorant Garamond',serif;font-size:4rem;font-style:italic;color:var(--text-dim);}
.popup-thumbs{display:flex;gap:.5rem;padding:.8rem;flex-wrap:wrap;background:var(--surface2);border-radius:0 0 0 16px;}
.popup-thumb{width:50px;height:50px;border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s;flex-shrink:0;background:var(--surface);display:flex;align-items:center;justify-content:center;}
.popup-thumb.active{border-color:var(--accent);}
.popup-thumb img{width:100%;height:100%;object-fit:cover;}
.popup-thumb-ph{font-size:.85rem;color:var(--text-dim);font-family:'Cormorant Garamond',serif;}
.popup-info{padding:1.8rem;display:flex;flex-direction:column;gap:1.1rem;overflow-y:auto;}
.popup-name{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;line-height:1.1;}
.popup-status-price{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.popup-price{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--accent2);}
.popup-divider{height:1px;background:rgba(74,158,202,.08);}
.popup-section-label{font-size:.63rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.45rem;}
.popup-desc{font-size:.83rem;color:var(--text-muted);line-height:1.9;}
.popup-outfits{display:flex;flex-direction:column;gap:.3rem;}
.popup-outfit-tag{display:inline-flex;align-items:center;gap:.4rem;font-size:.74rem;color:var(--text-muted);padding:.22rem .7rem;background:var(--surface2);border-radius:20px;border:1px solid rgba(74,158,202,.08);}
.popup-outfit-tag::before{content:'·';color:var(--accent3);}
.popup-fauna-row{display:flex;flex-wrap:wrap;gap:.4rem;}
.popup-taken-banner{background:rgba(203,110,110,.08);border:1px solid rgba(203,110,110,.2);border-radius:8px;padding:.65rem 1rem;font-size:.77rem;color:var(--red);font-style:italic;}

/* Claim & Auction in popup */
.popup-action-area{border-top:1px solid rgba(74,158,202,.08);padding-top:1rem;display:flex;flex-direction:column;gap:.7rem;}
.popup-action-btn{border:none;border-radius:8px;padding:.65rem 1.2rem;font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .3s;width:100%;}
.btn-claim{background:rgba(164,126,200,.15);border:1px solid rgba(164,126,200,.4);color:var(--purple);}
.btn-claim:hover{background:rgba(164,126,200,.25);}
.btn-auction{background:rgba(184,149,106,.1);border:1px solid rgba(184,149,106,.35);color:var(--gold2);}
.btn-auction:hover{background:rgba(184,149,106,.2);}
.btn-autobuy{background:rgba(74,158,202,.1);border:1px solid rgba(74,158,202,.3);color:var(--accent2);}
.btn-autobuy:hover{background:rgba(74,158,202,.2);}
.auction-info-box{background:var(--surface2);border-radius:8px;padding:.8rem 1rem;font-size:.79rem;color:var(--text-muted);line-height:1.7;}
.auction-info-box strong{color:var(--gold2);}
.auction-current{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--gold3);}
.claim-count{font-size:.75rem;color:var(--purple);margin-top:.2rem;}

/* ── FORM MODALS ── */
.form-modal{display:none;position:fixed;inset:0;z-index:600;background:rgba(7,10,17,.92);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:1.5rem;}
.form-modal.open{display:flex;}
.form-modal-box{background:var(--surface);border:1px solid rgba(74,158,202,.15);border-radius:14px;padding:2.2rem;width:100%;max-width:420px;position:relative;}
.form-modal-box h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;margin-bottom:.3rem;}
.form-modal-box p{font-size:.81rem;color:var(--text-muted);margin-bottom:1.3rem;line-height:1.7;}
.fm-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;}
.fm-close:hover{color:var(--text);}
.fm-field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.9rem;}
.fm-field label{font-size:.63rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);}
.fm-field input,.fm-field select{background:var(--surface2);border:1px solid rgba(74,158,202,.12);border-radius:7px;padding:.6rem .9rem;color:var(--text);font-family:'Jost',sans-serif;font-size:.86rem;outline:none;transition:border-color .3s;}
.fm-field input:focus,.fm-field select:focus{border-color:var(--accent3);}
.fm-field select option{background:var(--surface2);}
.fm-submit{width:100%;background:var(--accent3);border:none;border-radius:8px;padding:.75rem;color:var(--accent2);font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .3s;margin-top:.3rem;}
.fm-submit:hover{background:var(--accent);}
.fm-note{font-size:.73rem;color:var(--text-dim);margin-top:.9rem;line-height:1.65;font-style:italic;}

/* ── PRICING ── */
#pricing{padding:7rem 2rem;max-width:1100px;margin:0 auto;}
.pricing-intro{text-align:center;max-width:600px;margin:0 auto 4rem;font-size:.86rem;color:var(--text-muted);line-height:1.9;}
.pricing-group{margin-bottom:4rem;}
.pricing-group-eyebrow{font-size:.67rem;letter-spacing:.4em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:.6rem;}
.pricing-group-title{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-style:italic;color:var(--accent2);margin-bottom:1.5rem;display:block;}
.pr-carousel-track{display:flex;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.pr-slide{flex-shrink:0;padding-right:1.2rem;}
/* Pricing grid (replaces carousel) */
.pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;}
.pricing-card{background:var(--surface);border:1px solid rgba(74,158,202,.12);border-radius:12px;padding:1.7rem;position:relative;overflow:hidden;height:100%;display:flex;flex-direction:column;transition:transform .3s;}
.pricing-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent3),transparent);}
.pricing-card:hover{transform:translateY(-3px);}
/* Gold tiers — warm dark gold, no green */
.pricing-card.tier-mid{border-color:rgba(184,149,106,.2);}
.pricing-card.tier-mid::before{background:linear-gradient(90deg,transparent,rgba(184,149,106,.5),transparent);}
.pricing-card.tier-high{background:linear-gradient(160deg,#131209,#1c1710);border-color:rgba(184,149,106,.35);}
.pricing-card.tier-high::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.pricing-card.tier-max{background:linear-gradient(160deg,#1a1208,#201810);border-color:rgba(184,149,106,.5);box-shadow:0 0 30px rgba(184,149,106,.07);}
.pricing-card.tier-max::before{background:linear-gradient(90deg,transparent,var(--gold3),transparent);}
/* Pure gold card (Sa'nok Files) */
.pricing-card.gold-only{background:linear-gradient(160deg,#1a1208,#201810);border-color:rgba(184,149,106,.45);}
.pricing-card.gold-only::before{background:linear-gradient(90deg,transparent,var(--gold2),transparent);}
.pricing-card.gold-only .pc-navi{color:var(--gold);}
.pricing-card.gold-only .pc-includes li::before{color:var(--gold);}
.pricing-card.gold-only .pc-price{color:var(--gold3);}
.pc-navi{font-size:.61rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent3);margin-bottom:.35rem;}
.tier-mid .pc-navi{color:rgba(184,149,106,.6);}
.tier-high .pc-navi{color:var(--gold);}
.tier-max .pc-navi{color:var(--gold2);}
.pc-title{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:600;color:var(--text);margin-bottom:.85rem;}
.pc-includes{list-style:none;flex:1;margin-bottom:1.2rem;}
.pc-includes li{font-size:.78rem;color:var(--text-muted);line-height:1.8;padding-left:1rem;position:relative;}
.pc-includes li::before{content:'·';position:absolute;left:0;color:var(--accent3);}
.tier-mid .pc-includes li::before{color:rgba(184,149,106,.5);}
.tier-high .pc-includes li::before{color:var(--gold);}
.tier-max .pc-includes li::before{color:var(--gold2);}
.pc-price{font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:var(--accent2);margin-top:auto;}
.tier-mid .pc-price{color:var(--gold2);}
.tier-high .pc-price{color:var(--gold2);}
.tier-max .pc-price{color:var(--gold3);}
/* Info button on card */
.pc-info-btn{position:absolute;top:.9rem;right:.9rem;width:18px;height:18px;border-radius:50%;border:1px solid var(--accent3);background:none;color:var(--accent3);font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-family:'Jost',sans-serif;line-height:1;}
.pc-info-btn:hover{background:var(--accent3);color:var(--bg);}
/* Outfit info popup */
.outfit-popup{display:none;position:fixed;inset:0;z-index:600;background:rgba(7,10,17,.85);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:1.5rem;}
.outfit-popup.open{display:flex;}
.outfit-popup-box{background:var(--surface);border:1px solid rgba(74,158,202,.15);border-radius:14px;padding:2rem 2.2rem;width:100%;max-width:380px;position:relative;}
.outfit-popup-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent3),transparent);border-radius:14px 14px 0 0;}
.outfit-popup-box h3{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:300;color:var(--text);margin-bottom:1.2rem;}
.outfit-popup-box ul{list-style:none;}
.outfit-popup-box li{font-size:.82rem;color:var(--text-muted);line-height:1.85;padding-left:1rem;position:relative;}
.outfit-popup-box li::before{content:'·';position:absolute;left:0;color:var(--accent3);}
.outfit-popup-close{position:absolute;top:.9rem;right:1rem;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;}
.outfit-popup-close:hover{color:var(--text);}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
.outfit-detail{display:none;}/* hidden — replaced by popup */
.commercial-box{background:var(--surface);border:1px solid rgba(184,149,106,.22);border-radius:12px;padding:2.3rem;position:relative;overflow:hidden;}
.commercial-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.commercial-box h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--gold2);margin-bottom:.4rem;}
.commercial-box p{font-size:.82rem;color:var(--text-muted);line-height:1.9;margin-bottom:.9rem;}
.commercial-price-tag{font-family:'Cormorant Garamond',serif;font-size:1.75rem;color:var(--gold3);display:inline-block;margin-bottom:.9rem;}
.contract-dl-btn{display:inline-flex;align-items:center;gap:.6rem;margin-top:1.3rem;padding:.65rem 1.4rem;border:1px solid rgba(184,149,106,.4);border-radius:30px;color:var(--gold2);font-family:'Jost',sans-serif;font-size:.74rem;letter-spacing:.15em;text-transform:uppercase;background:rgba(184,149,106,.07);cursor:pointer;transition:all .3s;text-decoration:none;}
.contract-dl-btn:hover{background:rgba(184,149,106,.15);border-color:var(--gold2);}
.contract-dl-btn svg{flex-shrink:0;}
.commercial-terms{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-top:1.1rem;}
.commercial-term{background:rgba(11,14,20,.4);border:1px solid rgba(184,149,106,.1);border-radius:8px;padding:.85rem 1rem;}
.ct-label{font-size:.64rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem;}
.ct-text{font-size:.78rem;color:var(--text-muted);line-height:1.7;}
.pr-note{text-align:center;font-size:.75rem;color:var(--text-dim);margin-top:2rem;font-style:italic;}

/* ── TOS ── */
#tos{padding:7rem 2rem;max-width:800px;margin:0 auto;}
.tos-container{background:var(--surface);border:1px solid rgba(74,158,202,.1);border-radius:12px;padding:3.5rem;position:relative;}
.tos-deco{position:absolute;top:2rem;right:2.5rem;font-family:'Cormorant Garamond',serif;font-size:5rem;color:var(--text-dim);opacity:.2;user-select:none;pointer-events:none;}
.tos-rule{display:flex;gap:1.5rem;margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px solid rgba(74,158,202,.06);}
.tos-rule:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.tos-num{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-style:italic;color:var(--accent3);min-width:2.5rem;line-height:1;padding-top:.1rem;}
.tos-content h3{font-family:'Cormorant Garamond',serif;font-size:1.08rem;font-weight:600;color:var(--text);margin-bottom:.4rem;}
.tos-content p{font-size:.84rem;color:var(--text-muted);line-height:1.9;}
.tag{display:inline-block;font-size:.59rem;letter-spacing:.15em;text-transform:uppercase;padding:.13rem .58rem;border-radius:20px;margin-right:.4rem;margin-bottom:.5rem;border:1px solid;}
.tag-ok{background:rgba(110,203,138,.1);color:var(--green);border-color:rgba(110,203,138,.3);}
.tag-no{background:rgba(203,110,110,.1);color:var(--red);border-color:rgba(203,110,110,.3);}
.tag-ask{background:rgba(184,149,106,.1);color:var(--gold2);border-color:rgba(184,149,106,.3);}
.tag-inf{background:rgba(74,158,202,.1);color:var(--accent2);border-color:rgba(74,158,202,.3);}

/* ── FAQ ── */
#faq{padding:7rem 2rem;max-width:750px;margin:0 auto;}
.faq-item{border-bottom:1px solid rgba(74,158,202,.08);}
.faq-q{width:100%;background:none;border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:1.35rem 0;text-align:left;gap:1rem;font-family:'Cormorant Garamond',serif;font-size:1.06rem;color:var(--text);transition:color .3s;}
.faq-q:hover{color:var(--accent2);}
.faq-icon{width:20px;height:20px;border:1px solid var(--accent3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:.85rem;transition:all .3s;}
.faq-item.open .faq-icon{background:var(--accent3);transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.faq-item.open .faq-a{max-height:400px;}
.faq-a p{font-size:.84rem;color:var(--text-muted);line-height:1.9;padding-bottom:1.35rem;}

/* ── SOCIAL ── */
#social{padding:7rem 2rem 10rem;text-align:center;}
.social-links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:3rem;}
.social-link{display:flex;align-items:center;gap:.6rem;padding:.72rem 1.5rem;border:1px solid rgba(74,158,202,.15);border-radius:50px;text-decoration:none;color:var(--text-muted);font-size:.77rem;letter-spacing:.1em;transition:all .3s;background:var(--surface);}
.social-link:hover{border-color:var(--accent);color:var(--accent2);background:rgba(74,158,202,.05);transform:translateY(-2px);}

/* ── FOOTER ── */
footer{position:relative;z-index:1;border-top:1px solid rgba(74,158,202,.07);padding:1.8rem 3rem;display:flex;justify-content:space-between;align-items:center;font-size:.71rem;color:var(--text-dim);letter-spacing:.08em;}
footer .logo-sm{font-family:'Cormorant Garamond',serif;font-size:.93rem;}
footer a{color:var(--text-dim);text-decoration:none;transition:color .3s;}
footer a:hover{color:var(--accent2);}

/* ── ADMIN LOCK ── */
.admin-lock-btn{position:fixed;bottom:2rem;right:2rem;z-index:50;background:var(--surface);border:1px solid rgba(74,158,202,.15);color:var(--text-dim);cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .4s;box-shadow:0 4px 20px rgba(0,0,0,.3);font-size:1rem;}
.admin-lock-btn:hover{border-color:var(--accent3);color:var(--accent2);}

/* ── LOGIN MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:700;background:rgba(7,10,17,.93);backdrop-filter:blur(12px);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid rgba(74,158,202,.15);border-radius:14px;padding:2.5rem;width:100%;max-width:360px;position:relative;}
.modal-box h3{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:300;margin-bottom:.35rem;color:var(--text);}
.modal-box p{font-size:.81rem;color:var(--text-muted);margin-bottom:1.4rem;}
.modal-step-indicator{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent3);margin-bottom:1rem;}
.modal-input{width:100%;background:var(--surface2);border:1px solid rgba(74,158,202,.15);border-radius:8px;padding:.72rem 1rem;color:var(--text);font-family:'Jost',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s;margin-bottom:.8rem;}
.modal-input:focus{border-color:var(--accent3);}
.modal-error{font-size:.77rem;color:var(--red);margin-bottom:.8rem;display:none;}
.modal-btn{width:100%;background:var(--accent3);border:none;border-radius:8px;padding:.78rem;color:var(--accent2);font-family:'Jost',sans-serif;font-size:.81rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.modal-btn:hover{background:var(--accent);}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;}
.modal-close:hover{color:var(--text);}

/* ── ADMIN PANEL ── */
#admin-panel{display:none;position:fixed;inset:0;z-index:650;background:rgba(7,10,17,.97);backdrop-filter:blur(14px);overflow-y:auto;}
#admin-panel.open{display:block;}
.admin-inner{max-width:900px;margin:0 auto;padding:4rem 2rem;}
.admin-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem;}
.admin-header h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--text);}
.admin-close-btn{background:none;border:1px solid var(--accent3);color:var(--accent2);cursor:pointer;padding:.4rem 1.2rem;border-radius:20px;font-family:'Jost',sans-serif;font-size:.71rem;letter-spacing:.12em;transition:all .3s;}
.admin-close-btn:hover{background:var(--accent3);}
.admin-tabs{display:flex;gap:.4rem;margin-bottom:2rem;border-bottom:1px solid rgba(74,158,202,.08);flex-wrap:wrap;}
.admin-tab{background:none;border:none;cursor:pointer;padding:.7rem 1.1rem;font-family:'Jost',sans-serif;font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .3s;}
.admin-tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.admin-adopt-list{display:flex;flex-direction:column;gap:.9rem;}
.admin-row{background:var(--surface);border:1px solid rgba(74,158,202,.08);border-radius:10px;padding:1rem 1.3rem;}
.admin-row-top{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.admin-row-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--text);flex:1;}
.admin-toggle{background:none;border:1px solid;cursor:pointer;padding:.22rem .85rem;border-radius:20px;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;transition:all .3s;font-family:'Jost',sans-serif;}
.admin-toggle.available{border-color:rgba(110,203,138,.4);color:var(--green);}
.admin-toggle.available:hover{background:rgba(110,203,138,.1);}
.admin-toggle.taken{border-color:rgba(203,110,110,.4);color:var(--red);}
.admin-toggle.taken:hover{background:rgba(203,110,110,.1);}
.admin-row-section{margin-top:.7rem;padding-top:.7rem;border-top:1px solid rgba(74,158,202,.06);}
.admin-row-section label{font-size:.61rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:.35rem;}
.owner-entries,.claim-entries,.bid-entries{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.45rem;}
.entry-row{display:flex;align-items:center;gap:.6rem;font-size:.77rem;color:var(--text-muted);}
.entry-row .er-main{color:var(--text);flex:1;}
.entry-row .er-sub{color:var(--text-dim);font-size:.71rem;}
.entry-row .er-del{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:.9rem;transition:color .3s;}
.entry-row .er-del:hover{color:var(--red);}
.add-row{display:flex;gap:.5rem;margin-top:.35rem;flex-wrap:wrap;}
.add-input{flex:1;min-width:120px;background:var(--surface2);border:1px solid rgba(74,158,202,.12);border-radius:6px;padding:.38rem .65rem;color:var(--text);font-family:'Jost',sans-serif;font-size:.77rem;outline:none;transition:border-color .3s;}
.add-input:focus{border-color:var(--accent3);}
.add-btn{background:var(--accent3);border:none;border-radius:6px;padding:.38rem .85rem;color:var(--accent2);cursor:pointer;font-size:.69rem;letter-spacing:.1em;text-transform:uppercase;font-family:'Jost',sans-serif;transition:background .3s;}
.add-btn:hover{background:var(--accent);}
.add-adopt-form{background:var(--surface);border:1px solid rgba(74,158,202,.1);border-radius:10px;padding:1.5rem;margin-bottom:1.5rem;}
.add-adopt-form h3{font-family:'Cormorant Garamond',serif;font-size:1.12rem;color:var(--text);margin-bottom:1rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.65rem;}
.form-field{display:flex;flex-direction:column;gap:.28rem;}
.form-field label{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);}
.form-field input,.form-field textarea,.form-field select{background:var(--surface2);border:1px solid rgba(74,158,202,.12);border-radius:6px;padding:.48rem .68rem;color:var(--text);font-family:'Jost',sans-serif;font-size:.81rem;outline:none;transition:border-color .3s;resize:vertical;}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:var(--accent3);}
.fauna-checkboxes{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.25rem;}
.fauna-cb{display:flex;align-items:center;gap:.28rem;font-size:.74rem;color:var(--text-muted);cursor:pointer;}
.fauna-cb input{accent-color:var(--accent);}
.add-adopt-btn{background:var(--accent3);border:none;border-radius:8px;padding:.58rem 1.3rem;color:var(--accent2);font-family:'Jost',sans-serif;font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .3s;margin-top:.45rem;}
.add-adopt-btn:hover{background:var(--accent);}
.form-note{font-size:.71rem;color:var(--text-dim);margin-top:.35rem;font-style:italic;}
.sales-table{width:100%;border-collapse:collapse;}
.sales-table th{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);padding:.58rem 1rem;text-align:left;border-bottom:1px solid rgba(74,158,202,.08);}
.sales-table td{padding:.72rem 1rem;font-size:.8rem;color:var(--text-muted);border-bottom:1px solid rgba(74,158,202,.04);}
.sales-table td:first-child{font-family:'Cormorant Garamond',serif;font-size:.93rem;color:var(--text);}
.sales-empty{text-align:center;padding:3rem;color:var(--text-dim);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:1.05rem;}
.admin-auction-controls{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;}
.admin-auction-btn{background:none;border:1px solid;cursor:pointer;padding:.22rem .8rem;border-radius:20px;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;font-family:'Jost',sans-serif;transition:all .3s;}
.btn-start-auction{border-color:rgba(184,149,106,.4);color:var(--gold2);}
.btn-start-auction:hover{background:rgba(184,149,106,.1);}
.btn-end-auction{border-color:rgba(203,110,110,.4);color:var(--red);}
.btn-end-auction:hover{background:rgba(203,110,110,.1);}
.btn-clear-claims{border-color:rgba(164,126,200,.4);color:var(--purple);}
.btn-clear-claims:hover{background:rgba(164,126,200,.1);}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .popup-box{grid-template-columns:1fr;}
  .popup-gallery{border-right:none;border-bottom:1px solid rgba(74,158,202,.08);}
  .popup-main-img{border-radius:16px 16px 0 0;}
  .popup-thumbs{border-radius:0;}
  .options-grid,.commercial-terms,.form-grid,.pricing-grid{grid-template-columns:1fr;}
  .schedule-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:768px){
  nav{padding:1rem 1.4rem;}
  .nav-links{display:none;}
  #about{grid-template-columns:1fr;gap:2.5rem;}
  .about-deco{height:200px;}
  footer{flex-direction:column;gap:.8rem;text-align:center;}
  .tos-container{padding:2rem 1.5rem;}
  .schedule-grid{grid-template-columns:1fr;}
}
</style>
</head>

<div class="particles" id="particles"></div>

<!-- GALLERY (carousel + view all) -->

  <div class="section-header">
    <span class="eyebrow" data-i18n="gal_eye"></span>
    <h2><span data-i18n="gal_t1"></span> <em data-i18n="gal_t2"></em></h2>
    <p data-i18n="gal_desc"></p>
  </div>

/* ═══════════════════════════════════════════
   PASSWORDS (double step, SHA-256)
═══════════════════════════════════════════ */
let HASH1='', HASH2='';
let loginStep=0; // 0=closed, 1=step1, 2=step2

async function sha256(s){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
// Pre-compute both hashes on load
HASH1='e7ead489e9cf5d1ad42df90af0df82348078dc1f69eab4b5b543565a3fc8bb9e';
HASH2='051fbbfe033e183519e3c2cf5b5acdfbfb3259120b34d37d9ac38c6b55e0fe39';

function openLoginStep1(){
  loginStep=1;
  document.getElementById('login-step-label').textContent='Étape 1 / 2';
  document.getElementById('login-modal').classList.add('open');
  document.getElementById('admin-pw').value='';
  document.getElementById('login-err').style.display='none';
  setTimeout(()=>document.getElementById('admin-pw').focus(),100);
}
function closeLoginModal(){
  document.getElementById('login-modal').classList.remove('open');
  loginStep=0;
}
async function tryLogin(){
  const val=document.getElementById('admin-pw').value;
  const h=await sha256(val);
  document.getElementById('admin-pw').value='';
  if(loginStep===1){
    if(h===HASH1){
      loginStep=2;
      document.getElementById('login-step-label').textContent='Étape 2 / 2';
      document.getElementById('login-err').style.display='none';
    } else {
      document.getElementById('login-err').style.display='block';
    }
  } else if(loginStep===2){
    if(h===HASH2){
      closeLoginModal();
      openAdmin();
    } else {
      document.getElementById('login-err').style.display='block';
    }
  }
}

const SB_URL='https://ytmtgbjhgojtzqbposms.supabase.co';
const SB_KEY='sb_publishable_m7s-H_mrcLh5w5gSzCDsNA_0EnJrf4X';

async function sbFetch(path, opts={}){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    headers:{
      'apikey':SB_KEY,
      'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json',
      'Prefer': opts.prefer||'return=representation',
      ...opts.headers
    },
    method: opts.method||'GET',
    body: opts.body||undefined
  });
  if(!res.ok){
    const err=await res.text();
    console.error('Supabase error',res.status,err);
    return null;
  }
  const text=await res.text();
  return text?JSON.parse(text):null;
}

/* Load all adopts + their owners/claims/bids in one go */
async function loadAllData(){
  showLoading(true);
  try{
    const [rawAdopts, rawOwners, rawClaims, rawBids]=await Promise.all([
      sbFetch('adopts?select=*&order=id.asc'),
      sbFetch('owners?select=*&order=id.asc'),
      sbFetch('claims?select=*&order=id.asc'),
      sbFetch('bids?select=*&order=id.asc'),
    ]);
    if(!rawAdopts){showLoading(false);return;}
    adopts=rawAdopts.map(a=>({
      id:           a.id,
      name:         a.name,
      placeholder:  a.placeholder||'✦',
      images:       a.images||[],
      price:        a.price||'?? €',
      taken:        a.taken||false,
      mode:         a.mode||'standard',
      fauna:        a.fauna||[],
      desc:         a.description||'',
      outfits:      a.outfits||[],
      owners:       (rawOwners||[]).filter(o=>o.adopt_id===a.id).map(o=>({name:o.pseudo,date:o.date,dbId:o.id})),
      claims:       (rawClaims||[]).filter(c=>c.adopt_id===a.id).map(c=>({pseudo:c.pseudo,network:c.network,date:c.date,dbId:c.id})),
      auction: a.mode==='auction'?{
        active:        a.auction_active||false,
        autobuyPrice:  a.auction_autobuy_price||null,
        endsAt:        null,
        bids:          (rawBids||[]).filter(b=>b.adopt_id===a.id).map(b=>({pseudo:b.pseudo,amount:b.amount,date:b.date,dbId:b.id}))
      }:undefined
    }));
    nextId=adopts.length?Math.max(...adopts.map(a=>a.id))+1:1;
  }catch(e){console.error('loadAllData error',e);}
  showLoading(false);
  renderAdopts();
  renderPricing();renderTOS();renderFAQ();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
}

    document.body.appendChild(el);
  }
  el.style.display=on?'flex':'none';
}

/* ═══════════════════════════════════════════
   CAROUSEL ENGINE
═══════════════════════════════════════════ */
const carState={};
function getVis(){return window.innerWidth<=480?1:window.innerWidth<=900?2:3;}

function buildCarousel(trackId,dotsId,prevId,nextId,slides,slideClass,priceMode){
  const track=document.getElementById(trackId);
  const dots=document.getElementById(dotsId);
  if(!track||!dots) return;
  track.innerHTML=''; dots.innerHTML='';
  carState[trackId]={idx:0,slides,slideClass,dotsId,prevId,nextId};
  slides.forEach(s=>track.appendChild(s));
  const vis=getVis();
  const pages=Math.ceil(slides.length/vis);
  for(let i=0;i<pages;i++){
    const d=document.createElement('button');
    d.className='carousel-dot'+(i===0?' active':'');
    const pi=i; d.onclick=()=>carTo(trackId,pi);
    dots.appendChild(d);
  }
  updateSlideWidths(trackId,slideClass,priceMode);
  carTo(trackId,0);
}

function updateSlideWidths(trackId,slideClass,priceMode){
  const track=document.getElementById(trackId); if(!track) return;
  const vis=getVis();
  const gap=priceMode?1.2:1.4;
  track.querySelectorAll('.'+slideClass).forEach(sl=>{
    sl.style.minWidth=`calc(${100/vis}% - ${vis>1?gap+'rem':'0px'})`;
  });
}

function carTo(trackId,idx){
  const s=carState[trackId]; if(!s) return;
  const vis=getVis();
  const pages=Math.ceil(s.slides.length/vis);
  idx=Math.max(0,Math.min(idx,pages-1));
  s.idx=idx;
  const track=document.getElementById(trackId);
  const allSlides=track.querySelectorAll('.'+s.slideClass);
  if(!allSlides.length) return;
  const gap=parseFloat(getComputedStyle(allSlides[0]).paddingRight||0);
  const w=allSlides[0].offsetWidth+gap;
  track.style.transform=`translateX(-${idx*vis*w}px)`;
  document.querySelectorAll('#'+s.dotsId+' .carousel-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  const prev=document.getElementById(s.prevId);
  const next=document.getElementById(s.nextId);
  if(prev) prev.disabled=idx===0;
  if(next) next.disabled=idx>=pages-1;
}

function adoptMove(d){const s=carState['adopt-track'];if(s) carTo('adopt-track',s.idx+d);}
// pricing now uses a static grid — no carousel needed

window.addEventListener('resize',()=>{
  const s=carState['adopt-track'];
  if(s){updateSlideWidths('adopt-track',s.slideClass,false);carTo('adopt-track',s.idx);}
});

/* ═══════════════════════════════════════════
   CARD BUILDER
═══════════════════════════════════════════ */
function makeAdoptCard(a,lang,forCarousel){
  const taken=a.taken;
  const isAuction=a.mode==='auction'&&a.auction?.active;
  const isClaim=a.mode==='claim';
  const claimCount=a.claims?.length||0;
  const topBid=isAuction&&a.auction.bids?.length?Math.max(...a.auction.bids.map(b=>b.amount)):null;

  let statusClass='s-available', statusText=T[lang].s_available;
  let cardClass='adopt-card';
  if(taken){statusClass='s-sold';statusText=T[lang].s_sold;cardClass+=' taken';}
  else if(isAuction){statusClass='s-auction';statusText=T[lang].s_auction;cardClass+=' auction-card';}
  else if(isClaim&&claimCount>0){statusClass='s-claim';statusText=T[lang].s_claim;}

  const faunaBadges=a.fauna.map(f=>`<span class="badge badge-fauna">${f}</span>`).join('');
  const claimBadge=isClaim&&claimCount>0&&!taken?`<span class="badge badge-claim">${claimCount} claim${claimCount>1?'s':''}</span>`:'';
  const auctionBadge=isAuction?`<span class="badge badge-auction">⚡ ${topBid?topBid+' €':'—'}</span>`:'';
  const imgContent=a.images?.length?`<img src="${a.images[0]}" alt="${a.name}">`:`<span class="card-img-placeholder">${a.placeholder}</span>`;
  const priceDisplay=isAuction&&topBid?`<p class="card-auction-price">⚡ ${topBid} €</p>`:`<p class="card-price">${a.price}</p>`;
  const clickHandler=taken?'':'onclick="openPopup('+a.id+')"';

  const card=document.createElement('div');
  card.className=cardClass;
  card.setAttribute(clickHandler?'onclick':'data-noop',taken?'':('openPopup('+a.id+')'));
  if(!taken) card.onclick=()=>openPopup(a.id);
  card.innerHTML=`
    <div class="card-img" data-label="${T[lang].taken_label}">${imgContent}</div>
    <div class="card-body">
      <p class="card-name">${a.name}</p>
      <span class="card-status ${statusClass}">${statusText}</span>
      ${priceDisplay}
      <div class="card-badges">${faunaBadges}${claimBadge}${auctionBadge}</div>
    </div>`;
  return card;
}

/* ═══════════════════════════════════════════
   RENDER ADOPT CAROUSEL
═══════════════════════════════════════════ */
let adoptSlides=[];
function renderAdopts(){
  const lang=currentLang;
  adoptSlides=adopts.map(a=>{
    const slide=document.createElement('div');
    slide.className='adopt-slide';
    slide.appendChild(makeAdoptCard(a,lang,true));
    return slide;
  });
  buildCarousel('adopt-track','adopt-dots','adopt-prev','adopt-next',adoptSlides,'adopt-slide',false);
}

    {k:'all',l:T[lang].filter_all},
    {k:'available',l:T[lang].filter_available},
    {k:'claim',l:T[lang].filter_claim},
    {k:'auction',l:T[lang].filter_auction},
    {k:'taken',l:T[lang].filter_taken},
  ];
  filtersEl.innerHTML=filters.map(f=>`<button class="filter-btn${galleryFilter===f.k?' active':''}" onclick="setFilter('${f.k}')">${f.l}</button>`).join('');
  // Grid
  const grid=document.getElementById('gallery-full-grid');
  grid.innerHTML='';
  adopts.filter(a=>{
    if(galleryFilter==='all') return true;
    if(galleryFilter==='taken') return a.taken;
    if(galleryFilter==='available') return !a.taken&&a.mode==='standard';
    if(galleryFilter==='claim') return !a.taken&&a.mode==='claim';
    if(galleryFilter==='auction') return !a.taken&&a.mode==='auction'&&a.auction?.active;
    return true;
  }).forEach(a=>grid.appendChild(makeAdoptCard(a,lang,false)));
}

function openPopup(id){
  const a=adopts.find(x=>x.id===id); if(!a) return;
  currentPopupId=id;
  const lang=currentLang;
  const imgs=a.images||[];

  // Gallery side
  const mainEl=document.getElementById('popup-main-img');
  const thumbsEl=document.getElementById('popup-thumbs');

  function setMain(idx){
    if(imgs.length) mainEl.innerHTML=`<img src="${imgs[idx]}" alt="${a.name}">`;
    else mainEl.innerHTML=`<span class="popup-main-placeholder">${a.placeholder}</span>`;
    thumbsEl.querySelectorAll('.popup-thumb').forEach((t,i)=>t.classList.toggle('active',i===idx));
  }
  if(imgs.length>1){
    thumbsEl.innerHTML=imgs.map((url,i)=>`<div class="popup-thumb${i===0?' active':''}" onclick="window._popupSetMain(${i})"><img src="${url}" alt="vue ${i+1}"></div>`).join('');
  } else if(imgs.length===1){
    thumbsEl.innerHTML=`<div class="popup-thumb active"><img src="${imgs[0]}" alt="${a.name}"></div>`;
  } else {
    thumbsEl.innerHTML=`<div class="popup-thumb active"><span class="popup-thumb-ph">${a.placeholder}</span></div>`;
  }
  setMain(0);
  window._popupSetMain=setMain;

  // Info side
  const isAuction=a.mode==='auction'&&a.auction?.active;
  const isClaim=!a.taken&&a.mode==='claim';
  const isStandard=!a.taken&&a.mode==='standard';
  const claimCount=a.claims?.length||0;
  const bids=a.auction?.bids||[];
  const topBid=bids.length?Math.max(...bids.map(b=>b.amount)):null;
  const autobuyPrice=a.auction?.autobuyPrice;

  let statusClass='s-available', statusText=T[lang].s_available;
  if(a.taken){statusClass='s-sold';statusText=T[lang].s_sold;}
  else if(isAuction){statusClass='s-auction';statusText=T[lang].s_auction;}
  else if(isClaim&&claimCount>0){statusClass='s-claim';statusText=T[lang].s_claim;}

  const faunaHtml=a.fauna.length?a.fauna.map(f=>`<span class="badge badge-fauna">${f}</span>`).join(''):`<span style="font-size:.77rem;color:var(--text-dim);font-style:italic">${lang==='fr'?'Aucune':'None'}</span>`;
  const outfitsHtml=a.outfits?.length?a.outfits.map(o=>`<span class="popup-outfit-tag">${o}</span>`).join(''):`<span style="font-size:.77rem;color:var(--text-dim);font-style:italic">—</span>`;

  let actionHtml='';
  if(a.taken){
    actionHtml=`<div class="popup-action-area"><div class="popup-taken-banner">${T[lang].popup_taken}</div></div>`;
  } else if(isAuction){
    const bidInfo=topBid?`<strong>${T[lang].current_bid} : ${topBid} €</strong>`:T[lang].no_bids;
    const autobuyBtn=autobuyPrice&&!topBid?`<button class="popup-action-btn btn-autobuy" onclick="openAutobuyModal()">${T[lang].popup_autobuy} — ${T[lang].popup_ab_at} ${autobuyPrice} €</button>`:'';
    actionHtml=`<div class="popup-action-area">
      <div class="auction-info-box">${bidInfo}${autobuyPrice?`<br><span style="font-size:.75rem;color:var(--text-dim)">${T[lang].popup_ab_at} : ${autobuyPrice} €</span>`:''}</div>
      <button class="popup-action-btn btn-auction" onclick="openBidModal()">⚡ ${lang==='fr'?'Enchérir':'Place a bid'}</button>
      ${autobuyBtn}
    </div>`;
  } else if(isClaim){
    const cCount=claimCount>0?`<p class="claim-count">⚑ ${claimCount>1?claimCount+' '+T[lang].claim_count_many:T[lang].claim_count_one}</p>`:'';
    actionHtml=`<div class="popup-action-area">${cCount}<button class="popup-action-btn btn-claim" onclick="openClaimModal()">⚑ Claim</button></div>`;
  } else if(isStandard){
    actionHtml=`<div class="popup-action-area"><button class="popup-action-btn btn-claim" onclick="openClaimModal()">⚑ Claim</button></div>`;
  }

  document.getElementById('popup-info').innerHTML=`
    ${a.taken?`<div class="popup-taken-banner">${T[lang].popup_taken}</div>`:''}
    <div>
      <p class="popup-name">${a.name}</p>
      <div class="popup-status-price">
        <span class="card-status ${statusClass}">${statusText}</span>
        <span class="popup-price">${a.price}</span>
      </div>
    </div>
    <div class="popup-divider"></div>
    <div><p class="popup-section-label">Description</p><p class="popup-desc">${a.desc||'—'}</p></div>
    <div><p class="popup-section-label">${T[lang].popup_outfits}</p><div class="popup-outfits">${outfitsHtml}</div></div>
    <div><p class="popup-section-label">${T[lang].popup_fauna}</p><div class="popup-fauna-row">${faunaHtml}</div></div>
    ${actionHtml}`;

  document.getElementById('adopt-popup').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePopup(){
  document.getElementById('adopt-popup').classList.remove('open');
  document.body.style.overflow='';
}
function closePopupOutside(e){if(e.target===document.getElementById('adopt-popup')) closePopup();}

function openClaimModal(){document.getElementById('claim-modal').classList.add('open');}
function openBidModal(){
  const a=adopts.find(x=>x.id===currentPopupId); if(!a) return;
  const lang=currentLang;
  const bids=a.auction?.bids||[];
  const topBid=bids.length?Math.max(...bids.map(b=>b.amount)):null;
  document.getElementById('bid-current-info').textContent=topBid?`${T[lang].current_bid} : ${topBid} €`:T[lang].no_bids;
  document.getElementById('bid-modal').classList.add('open');
}
function openAutobuyModal(){document.getElementById('autobuy-modal').classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

async function submitClaim(){
  const pseudo=document.getElementById('claim-pseudo').value.trim();
  const network=document.getElementById('claim-network').value;
  if(!pseudo||!currentPopupId) return;
  const a=adopts.find(x=>x.id===currentPopupId); if(!a) return;
  const row=await sbFetch('claims',{
    method:'POST',
    body:JSON.stringify({adopt_id:a.id,pseudo,network,date:new Date().toISOString().slice(0,10)})
  });
  if(row&&row[0]){
    if(!a.claims) a.claims=[];
    a.claims.push({pseudo,network,date:new Date().toISOString().slice(0,10),dbId:row[0].id});
  }
  closeModal('claim-modal'); closePopup();
  renderAdopts();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
  alert(currentLang==='fr'?`✓ Demande envoyée ! Je te contacterai sur ${network}.`:`✓ Request sent! I'll contact you on ${network}.`);
}

async function submitBid(){
  const pseudo=document.getElementById('bid-pseudo').value.trim();
  const amount=parseFloat(document.getElementById('bid-amount').value);
  if(!pseudo||!amount||!currentPopupId) return;
  const a=adopts.find(x=>x.id===currentPopupId); if(!a||!a.auction) return;
  const topBid=a.auction.bids?.length?Math.max(...a.auction.bids.map(b=>b.amount)):0;
  if(amount<=topBid){alert(currentLang==='fr'?`L'offre doit dépasser ${topBid} €.`:`Bid must exceed ${topBid} €.`);return;}
  const row=await sbFetch('bids',{
    method:'POST',
    body:JSON.stringify({adopt_id:a.id,pseudo,amount,date:new Date().toISOString().slice(0,10)})
  });
  if(row&&row[0]){
    a.auction.bids.push({pseudo,amount,date:new Date().toISOString().slice(0,10),dbId:row[0].id});
  }
  closeModal('bid-modal'); closePopup();
  renderAdopts();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
  alert(currentLang==='fr'?`✓ Offre de ${amount} € enregistrée !`:`✓ Bid of ${amount} € recorded!`);
}

async function submitAutobuy(){
  const pseudo=document.getElementById('ab-pseudo').value.trim();
  if(!pseudo||!currentPopupId) return;
  const a=adopts.find(x=>x.id===currentPopupId); if(!a||!a.auction) return;
  // Mark adopt as taken + close auction in DB
  await sbFetch(`adopts?id=eq.${a.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({taken:true,auction_active:false})});
  // Add owner in DB
  const row=await sbFetch('owners',{method:'POST',body:JSON.stringify({adopt_id:a.id,pseudo,date:new Date().toISOString().slice(0,10)})});
  a.taken=true; a.auction.active=false;
  if(!a.owners) a.owners=[];
  a.owners.push({name:pseudo,date:new Date().toISOString().slice(0,10),dbId:row?.[0]?.id});
  closeModal('autobuy-modal'); closePopup();
  renderAdopts();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
  alert(currentLang==='fr'?`✓ Auto-buy confirmé pour ${pseudo} !`:`✓ Auto-buy confirmed for ${pseudo}!`);
}

async function addNewAdopt(){
  const name=document.getElementById('nw-name').value.trim(); if(!name) return;
  const price=document.getElementById('nw-price').value.trim()||'?? €';
  const emoji=document.getElementById('nw-emoji').value.trim()||'✦';
  const mode=document.getElementById('nw-mode').value;
  const abPrice=parseFloat(document.getElementById('nw-ab').value)||null;
  const imgs=document.getElementById('nw-imgs').value.trim().split('\n').map(s=>s.trim()).filter(Boolean);
  const desc=document.getElementById('nw-desc').value.trim();
  const outfits=document.getElementById('nw-outfits').value.trim().split('\n').map(s=>s.trim()).filter(Boolean);
  const fauna=FAUNA_LIST.filter(f=>document.getElementById('fc-'+f)?.checked);
  const payload={name,placeholder:emoji,images:imgs,price,taken:false,mode,fauna,description:desc,outfits,
    auction_active:mode==='auction',auction_autobuy_price:mode==='auction'?abPrice:null};
  const row=await sbFetch('adopts',{method:'POST',body:JSON.stringify(payload)});
  if(row&&row[0]){
    const a={...row[0],desc:row[0].description,owners:[],claims:[],
      auction:mode==='auction'?{active:true,autobuyPrice:abPrice,endsAt:null,bids:[]}:undefined};
    adopts.push(a);
    nextId=Math.max(nextId,a.id+1);
  }
  renderAdopts(); renderAdminAdopts(); renderAdminClaims(); renderAdminSales();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
}

async function toggleAdopt(id){
  const a=adopts.find(x=>x.id===id); if(!a) return;
  a.taken=!a.taken;
  await sbFetch(`adopts?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({taken:a.taken})});
  renderAdopts(); renderAdminAdopts(); renderAdminSales();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
}

async function addOwner(id){
  const input=document.getElementById('oi-'+id);
  const name=input.value.trim(); if(!name) return;
  const a=adopts.find(x=>x.id===id); if(!a) return;
  const row=await sbFetch('owners',{method:'POST',body:JSON.stringify({adopt_id:id,pseudo:name,date:new Date().toISOString().slice(0,10)})});
  if(!a.owners) a.owners=[];
  a.owners.push({name,date:new Date().toISOString().slice(0,10),dbId:row?.[0]?.id});
  a.taken=true; input.value='';
  await sbFetch(`adopts?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({taken:true})});
  renderAdopts(); renderAdminAdopts(); renderAdminSales();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
}

async function delOwner(id,idx){
  const a=adopts.find(x=>x.id===id); if(!a) return;
  const owner=a.owners[idx];
  if(owner?.dbId) await sbFetch(`owners?id=eq.${owner.dbId}`,{method:'DELETE',prefer:'return=minimal'});
  a.owners.splice(idx,1);
  renderAdminAdopts(); renderAdminSales();
}

async function delClaim(id,idx){
  const a=adopts.find(x=>x.id===id); if(!a||!a.claims) return;
  const claim=a.claims[idx];
  if(claim?.dbId) await sbFetch(`claims?id=eq.${claim.dbId}`,{method:'DELETE',prefer:'return=minimal'});
  a.claims.splice(idx,1);
  renderAdminClaims(); renderAdopts();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
}

async function startAuction(id){
  const a=adopts.find(x=>x.id===id); if(!a) return;
  if(!a.auction) a.auction={active:true,autobuyPrice:null,endsAt:null,bids:[]};
  a.auction.active=true; a.mode='auction';
  await sbFetch(`adopts?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({mode:'auction',auction_active:true})});
  renderAdopts(); renderAdminAdopts();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
}

async function endAuction(id){
  const a=adopts.find(x=>x.id===id); if(!a||!a.auction) return;
  a.auction.active=false;
  await sbFetch(`adopts?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({auction_active:false})});
  renderAdopts(); renderAdminAdopts();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
}

let currentLang='fr';
function setLang(lang){
  currentLang=lang;
  document.documentElement.lang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim().toLowerCase()===lang));
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(T[lang][k]!==undefined&&typeof T[lang][k]==='string') el.textContent=T[lang][k];
  });
  // schedule uses innerHTML for strong/small tags
  ['sch_week','sch_eve','sch_wknd'].forEach(k=>{
    document.querySelectorAll('[data-i18n="'+k+'"]').forEach(el=>{el.innerHTML=T[lang][k];});
  });
  renderAdopts(); renderPricing(); renderTOS(); renderFAQ();
  if(document.getElementById('gallery-page').classList.contains('open')) renderGalleryPage();
}

})();
